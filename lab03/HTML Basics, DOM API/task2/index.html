<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кликер</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
        .stats { margin-top: 20px; font-size: 20px; }
    </style>
</head>
<body>

    <button id="clickBtn">Кликни меня!</button>
    <div class="stats">
        <p>Счетчик кликов: <span id="counter">0</span></p>
        <p>Среднее кол-во кликов в секунду: <span id="cps">0.00</span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
