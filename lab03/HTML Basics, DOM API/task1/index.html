<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание HTML</title>
    <style>
        table {
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>

    <h1>Добро пожаловать!</h1>

    <p>
        <i>Приветствуем</i> <u>вас</u> <b>в нашем</b> <a href="#">магазине</a>!
    </p>

    <p>
        &lt;h1&gt;Теорема Пифагора&lt;/h1&gt;: <i>c</i><sup>2</sup> = <i>a</i><sup>2</sup> + <i>b</i><sup>2</sup>
    </p>

    <table>
        <tr>
            <td colspan="2">Информация</td> </tr>
        <tr>
            <td>Старая цена: <s>1000 ₽</s></td> 
            <td>Новая цена: 500 ₽</td>
        </tr>
    </table>

    <script src="script.js"></script>

</body>
</html>
